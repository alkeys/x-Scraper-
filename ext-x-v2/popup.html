<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ext-x-v2</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="contenedor">
      <div class="logo" aria-hidden="true">A</div>
      <h1>ext-x-v2</h1>
      <p class="nota">Captura en X y descarga media en un click.</p>

      <section class="tarjeta">
        <div class="fila"><span>Imagenes</span><strong id="total-imagenes">0</strong></div>
        <div class="fila"><span>Videos</span><strong id="total-videos">0</strong></div>
        <div class="fila">
          <span>Min video (KB)</span>
          <select id="sel-min-video-kb">
            <option value="0">0</option>
            <option value="300" selected>300</option>
            <option value="1024">1024</option>
            <option value="5120">5120</option>
          </select>
        </div>
      </section>

      <div class="acciones">
        <button id="btn-empezar">Empezar captura</button>
        <button id="btn-detener" class="sec">Detener captura</button>
        <button id="btn-descargar">Descargar todo</button>
        <button id="btn-descargar-img" class="sec">Descargar solo imagenes</button>
        <button id="btn-descargar-vid" class="sec">Descargar solo videos</button>
        <button id="btn-exportar" class="sec">Exportar TXT</button>
        <button id="btn-limpiar" class="sec">Limpiar</button>
      </div>

      <p id="estado" class="estado"></p>
      <p class="credito">Hecho por alkeys. Uso no comercial. Bajo tu responsabilidad.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
